<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="header"></div>

    <div class="loadspace">
        <div class="loadspace-container">
            <input type="file" id="file-input" hidden accept="*/*">
            <button class="loadspace-button" id="upload-button">Выбрать данные</button>
            <div id="upload-status"></div>
        </div>
    </div>

    <script>
        fetch('/static/components/header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header').innerHTML = data;
            });
    </script>

    <script type="module" src="/static/js/fileUploader.js"></script>
</body>
</html>
